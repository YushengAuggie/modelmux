<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ModelMux — LLM API Testing Tool</title>
    <meta
      name="description"
      content="ModelMux is a polished LLM API testing workspace for comparing providers, shaping prompts, and inspecting responses with clarity."
    />
    <meta name="theme-color" content="#0f172a" />
    <meta property="og:title" content="ModelMux" />
    <meta
      property="og:description"
      content="Test LLM APIs with a cleaner workflow for provider selection, model search, prompt editing, and response inspection."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      (() => {
        const fallbackTheme = 'dark';
        try {
          const raw = localStorage.getItem('api-pilot-store-v1');
          const parsed = raw ? JSON.parse(raw) : null;
          const theme = parsed?.state?.theme === 'light' || parsed?.state?.theme === 'dark' ? parsed.state.theme : fallbackTheme;
          document.documentElement.classList.toggle('dark', theme === 'dark');
          document.documentElement.style.colorScheme = theme;
          document.querySelector('meta[name="theme-color"]')?.setAttribute('content', theme === 'dark' ? '#0f172a' : '#f4f8fb');
        } catch {
          document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = fallbackTheme;
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
